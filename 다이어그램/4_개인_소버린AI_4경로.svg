<g class="node c-gray"><rect x="90" y="250" width="510" height="58" rx="8" stroke-width="0.5"/><text class="th" x="345" y="272" text-anchor="middle" dominant-baseline="central">from-scratch 소형 모델</text><text class="ts" x="345" y="292" text-anchor="middle" dominant-baseline="central">0.5–3B 직접 학습 (가장 순수 · 품질 제한)</text></g>
