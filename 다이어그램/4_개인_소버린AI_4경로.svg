<title>개인이 만들 수 있는 소버린 AI의 4가지 경로</title>
<desc>로컬+RAG, 파인튜닝, 도메인 추가 사전학습, from-scratch 소형 모델 순으로 노력과 소버린 순수도가 커진다. 추천 시작점은 파인튜닝이다.</desc>
