<svg width="680" viewBox="0 0 680 320" role="img">
<style>
text{font-family:-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
.t{font-size:14px;fill:#3d3d3a}.ts{font-size:12px;fill:#73726c}.th{font-size:14px;font-weight:500;fill:#2c2c2a}
.arr{stroke:#73726c;stroke-width:1.5px;fill:none}
.c-gray>rect,rect.c-gray{fill:#F1EFE8;stroke:#5F5E5A}.c-gray .th,.c-gray .t{fill:#2C2C2A}.c-gray .ts{fill:#444441}
.c-blue>rect,rect.c-blue{fill:#E6F1FB;stroke:#185FA5}.c-blue .th,.c-blue .t{fill:#0C447C}.c-blue .ts{fill:#185FA5}
.c-teal>rect,rect.c-teal{fill:#E1F5EE;stroke:#0F6E56}.c-teal .th,.c-teal .t{fill:#085041}.c-teal .ts{fill:#0F6E56}
.c-purple>rect,rect.c-purple{fill:#EEEDFE;stroke:#534AB7}.c-purple .th,.c-purple .t{fill:#3C3489}.c-purple .ts{fill:#534AB7}
.c-red>rect,rect.c-red{fill:#FCEBEB;stroke:#A32D2D}.c-red .th,.c-red .t{fill:#791F1F}.c-red .ts{fill:#A32D2D}
.c-amber>rect,rect.c-amber{fill:#FAEEDA;stroke:#854F0B}.c-amber .th,.c-amber .t{fill:#633806}.c-amber .ts{fill:#854F0B}
</style>

<title>증류와 소버린 AI: 선생 모델 출처에 따른 갈림</title>
<desc>증류의 선생 모델이 해외 폐쇄형이면 이름뿐인 소버린, 해외 공개가중치면 파생 모델, 내가 from-scratch로 만든 모델이면 진짜 소버린 스택이 된다.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="node c-gray"><rect x="50" y="50" width="275" height="62" rx="8" stroke-width="0.5"/><text class="th" x="187" y="74" text-anchor="middle" dominant-baseline="central">해외 폐쇄형 모델</text><text class="ts" x="187" y="94" text-anchor="middle" dominant-baseline="central">GPT · Gemini · Claude</text></g>
<line x1="325" y1="81" x2="401" y2="81" class="arr" marker-end="url(#arrow)"/>
<g class="node c-red"><rect x="405" y="50" width="230" height="62" rx="8" stroke-width="0.5"/><text class="th" x="520" y="74" text-anchor="middle" dominant-baseline="central">이름뿐인 소버린</text><text class="ts" x="520" y="94" text-anchor="middle" dominant-baseline="central">외부 종속 잔존</text></g>
<g class="node c-gray"><rect x="50" y="142" width="275" height="62" rx="8" stroke-width="0.5"/><text class="th" x="187" y="166" text-anchor="middle" dominant-baseline="central">해외 공개가중치 모델</text><text class="ts" x="187" y="186" text-anchor="middle" dominant-baseline="central">Llama · Qwen · GLM</text></g>
<line x1="325" y1="173" x2="401" y2="173" class="arr" marker-end="url(#arrow)"/>
<g class="node c-amber"><rect x="405" y="142" width="230" height="62" rx="8" stroke-width="0.5"/><text class="th" x="520" y="166" text-anchor="middle" dominant-baseline="central">파생 모델</text><text class="ts" x="520" y="186" text-anchor="middle" dominant-baseline="central">from scratch 아님</text></g>
<g class="node c-gray"><rect x="50" y="234" width="275" height="62" rx="8" stroke-width="0.5"/><text class="th" x="187" y="258" text-anchor="middle" dominant-baseline="central">자체 from-scratch 모델</text><text class="ts" x="187" y="278" text-anchor="middle" dominant-baseline="central">내가 학습한 큰 모델</text></g>
<line x1="325" y1="265" x2="401" y2="265" class="arr" marker-end="url(#arrow)"/>
<g class="node c-teal"><rect x="405" y="234" width="230" height="62" rx="8" stroke-width="0.5"/><text class="th" x="520" y="258" text-anchor="middle" dominant-baseline="central">진짜 소버린 스택</text><text class="ts" x="520" y="278" text-anchor="middle" dominant-baseline="central">증류=경량화 도구</text></g>
</svg>